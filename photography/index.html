<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>howard's studio</title>
    <meta
      name="description"
      content="Haoyang (Howard) Hu - Photography portfolio with film, graduation, gig work, and creative projects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/public/avatars/howard_idle.png" />
    <link rel="apple-touch-icon" href="/public/avatars/howard_idle.png" />
    <link rel="stylesheet" href="/styles.css?v=20260314-1" />
    <link rel="stylesheet" href="/styles/email-panel.css?v=20260314-1" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a href="/" class="logo">HOWARD HU</a>
        <div class="nav-right">
          <nav>
            <ul class="nav-links">
              <li><a href="/about/" data-nav="about">About</a></li>
              <li><a href="/projects/" data-nav="projects">Projects</a></li>
              <li>
                <button id="email-open-trigger" class="nav-email-btn" type="button" data-nav="email">
                  Email
                </button>
              </li>
            </ul>
          </nav>
          <div class="header-controls">
            <details class="lang-dropdown">
              <summary class="mode-toggle" aria-label="Language">🌐</summary>
              <div class="lang-dropdown-menu" role="menu" aria-label="Language menu">
                <button type="button" class="lang-option" data-lang-option="en">English</button>
                <button type="button" class="lang-option" data-lang-option="zh">中文</button>
                <button type="button" class="lang-option" data-lang-option="ko">한국인</button>
              </div>
            </details>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="photography" class="container section reveal">
        <div class="photo-top">
          <img
            class="photo-top-avatar"
            src="/public/avatars/howard_camera.png"
            alt="Howard camera pixel avatar"
            width="112"
            height="112"
          />
          <p
            id="photography-typed-lead"
            class="photography-typed-lead is-typing"
            data-text="Capturing moments, documenting stories, and experimenting with light. Click each field to see samples."
          >
            Capturing moments, documenting stories, and experimenting with light. Click each field to see samples.
          </p>
        </div>

        <div class="photo-categories">
          <button class="photo-card" type="button" data-photo-category="film">
            <h3>Film</h3>
            <p>Analog moments captured on 35mm.</p>
            <div class="photo-card-preview" aria-hidden="true">
              <img src="" alt="" loading="lazy" />
            </div>
          </button>

          <button class="photo-card" type="button" data-photo-category="graduation">
            <h3>Graduation</h3>
            <p>Celebrating milestones and memories.</p>
            <div class="photo-card-preview" aria-hidden="true">
              <img src="" alt="" loading="lazy" />
            </div>
          </button>

          <button class="photo-card" type="button" data-photo-category="gig">
            <h3>Gig Works</h3>
            <p>Events, concerts, and commissioned work.</p>
            <div class="photo-card-preview" aria-hidden="true">
              <img src="" alt="" loading="lazy" />
            </div>
          </button>

          <button class="photo-card" type="button" data-photo-category="shenanigans">
            <h3>Shenanigans</h3>
            <p>Creative experiments and fun visual ideas.</p>
            <div class="photo-card-preview" aria-hidden="true">
              <img src="" alt="" loading="lazy" />
            </div>
          </button>
        </div>

        <div class="photo-cta">
          <a
            class="photo-cta-link"
            href="https://calendar.app.google/9sr1MgK4GPP5MWou8"
            target="_blank"
            rel="noopener noreferrer"
            >Book a session with me</a
          >
          <a
            class="photo-cta-link secondary"
            href="https://instagram.com/howiesflicks"
            target="_blank"
            rel="noopener noreferrer"
            >@howiesflicks</a
          >
        </div>
      </section>
    </main>

    <div id="photo-modal" class="photo-modal" aria-hidden="true">
      <div class="photo-modal-backdrop" data-photo-close></div>
      <div class="photo-modal-content" role="dialog" aria-modal="true" aria-label="Photography gallery">
        <button type="button" class="photo-modal-close" data-photo-close aria-label="Close gallery">×</button>
        <button type="button" class="photo-modal-nav prev" data-photo-prev aria-label="Previous photo">‹</button>
        <div class="photo-modal-stage">
          <img id="photo-modal-image" src="" alt="Photography showcase" />
          <p id="photo-modal-counter" class="photo-modal-counter">1 / 1</p>
        </div>
        <button type="button" class="photo-modal-nav next" data-photo-next aria-label="Next photo">›</button>
      </div>
    </div>

    <div id="email-panel-root"></div>

    <script>
      window.EMAIL_PANEL_ENDPOINT = "https://formspree.io/f/mnjgzolo";
    </script>
    <script src="/script.js?v=20260314-1"></script>
    <script type="module" src="/email-panel.js?v=20260314-1"></script>
  </body>
</html>
